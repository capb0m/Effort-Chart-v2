<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effort Chart - Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['DM Sans','sans-serif'],mono:['JetBrains Mono','monospace']}}}}
</script>
<style>
body{font-family:'DM Sans',sans-serif}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.float{animation:float 6s ease-in-out infinite}
.float-delay{animation:float 6s ease-in-out 2s infinite}
</style>
<script>
function initTheme(){const t=localStorage.getItem('theme')||'dark';document.documentElement.classList.toggle('dark',t==='dark')}
initTheme();
</script>
</head>
<body class="bg-gray-50 dark:bg-[#0a0a14] text-gray-900 dark:text-white min-h-screen overflow-hidden transition-colors duration-300">
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl float"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-orange-500/8 rounded-full blur-3xl float-delay"></div>
  </div>
  <div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4">
    <div class="mb-12 text-center">
      <div class="inline-flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 to-orange-500 flex items-center justify-center">
          <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight">Effort Chart</h1>
      </div>
      <p class="text-gray-500 dark:text-white/50 text-lg max-w-md">日々の努力を可視化し、目標達成をサポートする</p>
    </div>
    <div class="w-full max-w-sm">
      <div class="bg-white dark:bg-[#1e1e2e]/60 backdrop-blur-xl border border-gray-200 dark:border-white/[0.06] rounded-3xl p-8 shadow-xl dark:shadow-2xl">
        <h2 class="text-xl font-semibold text-center mb-2">ログイン</h2>
        <p class="text-gray-400 dark:text-white/40 text-sm text-center mb-8">アカウントにサインインして始めましょう</p>
        <button class="w-full flex items-center justify-center gap-3 bg-white dark:bg-white text-gray-800 font-medium py-3.5 px-6 rounded-2xl border border-gray-200 dark:border-transparent hover:bg-gray-50 transition-all duration-200 hover:shadow-lg active:scale-[0.98]">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google でログイン
        </button>
        <div class="mt-6 pt-6 border-t border-gray-100 dark:border-white/[0.06]">
          <p class="text-gray-400 dark:text-white/30 text-xs text-center leading-relaxed">ログインすることで、利用規約とプライバシーポリシーに同意したものとみなされます。</p>
        </div>
      </div>
      <div class="mt-8 grid grid-cols-3 gap-3">
        <div class="bg-white/80 dark:bg-[#1e1e2e]/30 backdrop-blur border border-gray-200 dark:border-white/[0.04] rounded-2xl p-4 text-center">
          <div class="text-2xl mb-1">⏱</div><div class="text-xs text-gray-500 dark:text-white/40">タイマー記録</div>
        </div>
        <div class="bg-white/80 dark:bg-[#1e1e2e]/30 backdrop-blur border border-gray-200 dark:border-white/[0.04] rounded-2xl p-4 text-center">
          <div class="text-2xl mb-1">📊</div><div class="text-xs text-gray-500 dark:text-white/40">グラフ分析</div>
        </div>
        <div class="bg-white/80 dark:bg-[#1e1e2e]/30 backdrop-blur border border-gray-200 dark:border-white/[0.04] rounded-2xl p-4 text-center">
          <div class="text-2xl mb-1">🏆</div><div class="text-xs text-gray-500 dark:text-white/40">実績解除</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

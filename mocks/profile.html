<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effort Chart - プロフィール</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['DM Sans','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<style>body{font-family:'DM Sans',sans-serif}.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}</style>
<script>
function initTheme(){const t=localStorage.getItem('theme')||'dark';document.documentElement.classList.toggle('dark',t==='dark');updateRadios()}
function setTheme(mode){if(mode==='system'){const p=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.classList.toggle('dark',p)}else{document.documentElement.classList.toggle('dark',mode==='dark')}localStorage.setItem('theme',mode);updateRadios()}
function updateRadios(){const t=localStorage.getItem('theme')||'dark';document.querySelectorAll('[name=theme]').forEach(r=>{r.checked=r.value===t})}
initTheme();
</script>
</head>
<body class="bg-gray-50 dark:bg-[#0a0a14] text-gray-900 dark:text-white min-h-screen transition-colors duration-200">
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside class="hidden lg:flex flex-col w-64 bg-white dark:bg-[#11111b] border-r border-gray-200 dark:border-white/[0.06] p-4 transition-colors">
    <div class="flex items-center gap-2.5 px-3 py-2 mb-8"><div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-orange-500 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div><span class="font-bold text-lg tracking-tight">Effort Chart</span></div>
    <nav class="flex-1 space-y-1">
      <a href="dashboard.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">ダッシュボード</a>
      <a href="records.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">記録</a>
      <a href="goals.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">目標</a>
      <a href="charts.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">グラフ</a>
      <a href="achievements.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">実績</a>
      <a href="categories.html" class="block px-3 py-2.5 rounded-xl text-gray-500 dark:text-white/50 text-sm">カテゴリー</a>
    </nav>
    <div class="border-t border-gray-200 dark:border-white/[0.06] pt-3 mt-2"><button onclick="setTheme(document.documentElement.classList.contains('dark')?'light':'dark')" class="block w-full px-3 py-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-white/[0.03] text-sm text-gray-500 dark:text-white/50 text-left">🌓 テーマ切替</button><a href="profile.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-violet-50 dark:bg-white/[0.06] text-violet-700 dark:text-white font-medium"><div class="w-8 h-8 rounded-full bg-violet-100 dark:bg-violet-500/20 flex items-center justify-center text-violet-600 dark:text-violet-400 text-sm font-bold">U</div><div class="text-sm">プロフィール</div></a></div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto scrollbar-hide pb-20 lg:pb-0">
    <header class="sticky top-0 z-30 bg-gray-50/80 dark:bg-[#0a0a14]/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/[0.06] px-4 lg:px-8 py-4 transition-colors"><h1 class="text-xl font-bold">プロフィール</h1><p class="text-sm text-gray-500 dark:text-white/40 mt-0.5">アカウントと設定</p></header>

    <div class="px-4 lg:px-8 py-6 max-w-3xl space-y-6">

      <!-- Account -->
      <div class="bg-white dark:bg-[#1e1e2e]/50 border border-gray-200 dark:border-white/[0.06] rounded-2xl p-6 transition-colors">
        <h2 class="text-sm font-medium text-gray-500 dark:text-white/50 uppercase tracking-wider mb-5">アカウント</h2>
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-2xl bg-violet-100 dark:bg-violet-500/20 flex items-center justify-center text-violet-600 dark:text-violet-400 text-2xl font-bold">U</div>
          <div>
            <div class="text-lg font-semibold">ユーザー名</div>
            <div class="text-sm text-gray-400 dark:text-white/40">user@example.com</div>
            <div class="flex items-center gap-1.5 mt-1"><div class="w-2 h-2 rounded-full bg-green-400"></div><span class="text-xs text-gray-500 dark:text-white/40">Google 認証済み</span></div>
          </div>
        </div>
        <button class="text-sm text-red-500 dark:text-red-400 hover:text-red-600 dark:hover:text-red-300 transition">ログアウト</button>
      </div>

      <!-- Theme -->
      <div class="bg-white dark:bg-[#1e1e2e]/50 border border-gray-200 dark:border-white/[0.06] rounded-2xl p-6 transition-colors">
        <h2 class="text-sm font-medium text-gray-500 dark:text-white/50 uppercase tracking-wider mb-5">テーマ設定</h2>
        <div class="grid grid-cols-3 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="theme" value="light" onchange="setTheme('light')" class="sr-only peer">
            <div class="peer-checked:ring-2 peer-checked:ring-violet-500 rounded-2xl border border-gray-200 dark:border-white/[0.06] p-4 text-center transition hover:border-violet-300 dark:hover:border-white/[0.1]">
              <div class="text-2xl mb-2">☀️</div>
              <div class="text-sm font-medium">ライト</div>
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme" value="dark" onchange="setTheme('dark')" class="sr-only peer">
            <div class="peer-checked:ring-2 peer-checked:ring-violet-500 rounded-2xl border border-gray-200 dark:border-white/[0.06] p-4 text-center transition hover:border-violet-300 dark:hover:border-white/[0.1]">
              <div class="text-2xl mb-2">🌙</div>
              <div class="text-sm font-medium">ダーク</div>
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme" value="system" onchange="setTheme('system')" class="sr-only peer">
            <div class="peer-checked:ring-2 peer-checked:ring-violet-500 rounded-2xl border border-gray-200 dark:border-white/[0.06] p-4 text-center transition hover:border-violet-300 dark:hover:border-white/[0.1]">
              <div class="text-2xl mb-2">💻</div>
              <div class="text-sm font-medium">システム</div>
            </div>
          </label>
        </div>
      </div>

      <!-- WhatPulse -->
      <div class="bg-white dark:bg-[#1e1e2e]/50 border border-gray-200 dark:border-white/[0.06] rounded-2xl p-6 transition-colors">
        <h2 class="text-sm font-medium text-gray-500 dark:text-white/50 uppercase tracking-wider mb-5">WhatPulse 連携</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-gray-500 dark:text-white/40 mb-1.5">ユーザー名</label>
            <input type="text" value="my_whatpulse_user" class="w-full bg-gray-50 dark:bg-[#11111b] border border-gray-200 dark:border-white/[0.08] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-400 transition">
          </div>
          <div>
            <label class="block text-xs text-gray-500 dark:text-white/40 mb-1.5">API キー</label>
            <input type="password" value="••••••••••••••••" class="w-full bg-gray-50 dark:bg-[#11111b] border border-gray-200 dark:border-white/[0.08] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-400 transition">
            <p class="text-[10px] text-gray-400 dark:text-white/25 mt-1"><a href="#" class="text-violet-500 dark:text-violet-400 hover:underline">whatpulse.org/go/settings-api-keys</a> で取得できます</p>
          </div>
          <div class="flex gap-3">
            <button class="bg-violet-500 hover:bg-violet-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition active:scale-95">保存</button>
            <button class="bg-gray-100 dark:bg-white/[0.06] border border-gray-200 dark:border-white/[0.06] text-gray-600 dark:text-white/70 text-sm px-5 py-2.5 rounded-xl transition hover:bg-gray-200 dark:hover:bg-white/[0.08]">接続テスト</button>
          </div>
        </div>
        <div class="mt-5 pt-5 border-t border-gray-100 dark:border-white/[0.06]">
          <div class="flex items-center gap-2 mb-3">
            <div class="w-2 h-2 rounded-full bg-green-400"></div>
            <span class="text-sm text-green-600 dark:text-green-400 font-medium">接続済み</span>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-50 dark:bg-white/[0.02] rounded-xl p-3"><div class="text-xs text-gray-400 dark:text-white/30 mb-0.5">最終同期</div><div class="text-sm font-mono">2026-03-04 14:30</div></div>
            <div class="bg-gray-50 dark:bg-white/[0.02] rounded-xl p-3"><div class="text-xs text-gray-400 dark:text-white/30 mb-0.5">本日キータイプ</div><div class="text-sm font-mono">12,847 回</div></div>
          </div>
          <button class="mt-3 text-sm text-violet-600 dark:text-violet-400 hover:underline">今すぐ同期 ↻</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="bg-white dark:bg-[#1e1e2e]/50 border border-gray-200 dark:border-white/[0.06] rounded-2xl p-6 transition-colors">
        <h2 class="text-sm font-medium text-gray-500 dark:text-white/50 uppercase tracking-wider mb-5">利用統計</h2>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold font-mono">1,247</div>
            <div class="text-xs text-gray-400 dark:text-white/40 mt-1">総記録数</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold font-mono">842<span class="text-sm text-gray-400 dark:text-white/30">h</span></div>
            <div class="text-xs text-gray-400 dark:text-white/40 mt-1">総努力時間</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold font-mono text-orange-500 dark:text-orange-400">24</div>
            <div class="text-xs text-gray-400 dark:text-white/40 mt-1">最長ストリーク</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold font-mono">186<span class="text-sm text-gray-400 dark:text-white/30">日</span></div>
            <div class="text-xs text-gray-400 dark:text-white/40 mt-1">利用開始から</div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<nav class="lg:hidden fixed bottom-0 inset-x-0 bg-white/95 dark:bg-[#11111b]/95 backdrop-blur-xl border-t border-gray-200 dark:border-white/[0.06] z-40"><div class="flex items-center justify-around py-2 px-2"><a href="dashboard.html" class="text-gray-400 dark:text-white/40 text-[10px]">ホーム</a><a href="records.html" class="text-gray-400 dark:text-white/40 text-[10px]">記録</a><a href="goals.html" class="text-gray-400 dark:text-white/40 text-[10px]">目標</a><a href="charts.html" class="text-gray-400 dark:text-white/40 text-[10px]">グラフ</a><a href="achievements.html" class="text-gray-400 dark:text-white/40 text-[10px]">その他</a></div></nav>
</body>
</html>
